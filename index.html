<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
     <meta name="description" content="Calculadora online para calcular tu nota PAU 2026 fácilmente. Incluye fase obligatoria y optativa con ponderaciones.">
     <meta name="keywords" content="nota PAU 2026, calcular nota selectividad, calculadora PAU, EVAU 2026">
     <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="HjrlT9jJdcilssCcDKtXRPlUCkjC3ZVKU4ql00TX1Vo" />
  <title>Calculadora Nota PAU 2026 – Calcula tu nota de acceso y final</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 750px;
      margin: 40px auto;
      background: #ffffffee;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border-top: 5px solid #2575fc;
    }
    h1 {
      text-align: center;
      color: #2575fc;
      margin-bottom: 30px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #6a11cb;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #2575fc;
    }
    .result {
      background: #e0f7ff;
      padding: 20px;
      border-radius: 10px;
      margin-top: 25px;
      font-size: 18px;
      text-align: center;
      border-left: 5px solid #2575fc;
    }
    .optativa-group {
      display: flex;
      gap: 10px;
    }
    .optativa-group input, .optativa-group select {
      flex: 1;
    }
    .optativa-limit {
      color: red;
      font-weight: bold;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculadora Nota PAU 2026</h1>

    <label>Nota media de Bachillerato</label>
    <input type="number" id="bach" step="0.01" min="0" max="10">

    <h3>Fase obligatoria</h3>
    <input type="number" placeholder="Lengua Castellana" id="lengua" step="0.01">
    <input type="number" placeholder="Historia / Filosofía" id="historia" step="0.01">
    <input type="number" placeholder="Primer Idioma extranjero" id="idioma" step="0.01">
    <input type="number" placeholder="Troncal de modalidad" id="modalidad" step="0.01">

    <h3>Fase voluntaria (máx. 4 asignaturas)</h3>
    <div id="optativas"></div>
    <div class="optativa-limit" id="optativa-limit-msg" style="display:none">Máximo de 4 asignaturas alcanzado</div>
    <button onclick="addOptativa()">Añadir asignatura</button>

    <button onclick="calcular()">Calcular nota</button>

    <div class="result" id="resultado"></div>
  </div>

  <script>
    let optativaCount = 0;
    function addOptativa() {
      if(optativaCount >= 4){
        document.getElementById('optativa-limit-msg').style.display = 'block';
        return;
      }
      document.getElementById('optativa-limit-msg').style.display = 'none';

      const div = document.createElement('div');
      div.classList.add('optativa-group');
      div.innerHTML = `
        <input type="number" placeholder="Nota" class="nota" step="0.01" min="0" max="10">
        <select class="ponderacion">
          <option value="0.1">0.1</option>
          <option value="0.2">0.2</option>
        </select>
      `;
      document.getElementById('optativas').appendChild(div);
      optativaCount++;
    }

    function calcular() {
      const bach = parseFloat(document.getElementById('bach').value) || 0;

      const lengua = parseFloat(document.getElementById('lengua').value) || 0;
      const historia = parseFloat(document.getElementById('historia').value) || 0;
      const idioma = parseFloat(document.getElementById('idioma').value) || 0;
      const modalidad = parseFloat(document.getElementById('modalidad').value) || 0;

      const obligatoria = (lengua + historia + idioma + modalidad) / 4;

      const notaAcceso = 0.6 * bach + 0.4 * obligatoria;

      let ponderadas = [];
      const notas = document.querySelectorAll('.nota');
      const ponders = document.querySelectorAll('.ponderacion');

      for (let i = 0; i < notas.length; i++) {
        const n = parseFloat(notas[i].value);
        const p = parseFloat(ponders[i].value);
        if (n >= 5) {
          ponderadas.push(n * p);
        }
      }

      ponderadas.sort((a, b) => b - a);
      const extra = (ponderadas[0] || 0) + (ponderadas[1] || 0);

      const final = notaAcceso + extra;

      let colorAcceso = notaAcceso >= 5 ? 'green' : 'red';
      let colorFinal = final >= 5 ? 'green' : 'red';

      document.getElementById('resultado').innerHTML = `
        <strong style="color:${colorAcceso}">Nota de acceso:</strong> ${notaAcceso.toFixed(2)} / 10<br>
        <strong style="color:${colorFinal}">Nota final:</strong> ${final.toFixed(2)} / 14
      `;
    }
  </script>
</body>
</html>
